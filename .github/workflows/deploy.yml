name: Deploy GymLog

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Crea lo ZIP dell'app da distribuire
      - name: Crea GymLog.zip
        run: cd dist && zip -r ../GymLog.zip . && cd ..

      # Prepara la cartella da deployare su GitHub Pages:
      # solo la landing page + il file ZIP
      - name: Prepara pagina di download
        run: |
          mkdir -p pages
          cp landing/index.html pages/index.html
          cp GymLog.zip pages/GymLog.zip

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - uses: actions/deploy-pages@v4
        id: deployment
