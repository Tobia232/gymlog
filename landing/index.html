<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymLog — Download</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #1f2937;
      border: 1px solid #30363d;
      border-radius: 16px;
      max-width: 400px;
      width: 90%;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #f97316;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    p {
      color: #8b949e;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f97316;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 20px;
    }
    .btn:hover { background: #ea6c0b; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .hint {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 0;
    }
    code {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      color: #f97316;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 28px;
      text-align: left;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #9ca3af;
    }
    .feature-icon { font-size: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏋️</div>
    <h1>GymLog</h1>
    <p>Il tuo diario di allenamento personale.<br>Tutto salvato in locale, nessun account.</p>

    <div class="features">
      <div class="feature"><span class="feature-icon">📋</span> Diario allenamenti con serie e pesi</div>
      <div class="feature"><span class="feature-icon">🗂️</span> Crea e modifica le tue schede</div>
      <div class="feature"><span class="feature-icon">📊</span> Statistiche e progressione pesi</div>
      <div class="feature"><span class="feature-icon">📴</span> Funziona completamente offline</div>
    </div>

    <a href="GymLog.zip" class="btn" download>
      ⬇️ Scarica GymLog
    </a>

    <p class="hint">
      Estrai lo ZIP → apri <code>index.html</code> nel browser
    </p>
  </div>
</body>
</html>
